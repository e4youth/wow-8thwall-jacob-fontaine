You see, the site of Rosewood Courts here was originally Emancipation Park, an extremely important social and recreational site where Juneteenth celebrations date all the way back to 1930. This is where Black families reunited to publicly celebrate our freedom and progress on our own terms. Emancipation Park was purchased by Black community members for use by the Black community. This land was originally bought by a formerly enslaved man named Thomas J. White. Once he started the Emancipation Park Association back in 1905, he bought a 5-acre tract right here within two years time.

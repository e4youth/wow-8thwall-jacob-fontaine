The East 11th Street corridor was once the social hub of Austin’s Black community, yet nowadays it is hard to recognize what used to be here. The Victory Grill was a live music venue and restaurant on the Chitlin’ Circuit, where big-time artists from all over the country performed at Black-owned institutions throughout the Jim Crow era.
Founded at the close of World War II in 1945 by Johnny Holmes, himself a Black veteran, this gave the community and the returning soldiers a place to unwind and socialize. It hosted Hall of Fame talent like B.B. King, James Brown, Ike and Tina Turner, Billie Holiday, Chuck Berry, and Etta James, not to mention the folks you haven’t even heard of. The Victory Grill attracted all kinds of people from all over Central Texas as soldiers, college students, even white locals and more showed up.
Now known as Victory East, this venue is still open and still thriving. But, of course, this came with plenty of challenges. There was a fire in 1988 and gentrification has in many ways left the 11th Street Corridor unrecognizable. But thanks to a friend of the original owner named RV Adams and some other gracious people like Eva Lindsey, the venue, the Victory Grill, and its legacy are intact on Austin's East Side. The Victory Grill was added to the National Register of Historic Places in 1998." info="duration: 108; chunkSize: 6; audioId: DialogueSound; textId: captionText"></a-entity><a-entity gltf-model="#jacobModel" anim-controller="lipSyncClip: Jacob Fontaine-LipSyncAction; audioId: DialogueSound"></a-entity></a-assets><a-entity id="dialogueEntity" sound="src: #DialogueSound; autoplay: false; positional: false;"></a-entity><a-camera id="camera" position="0 8 8" raycaster="objects: .cantap" cursor="
